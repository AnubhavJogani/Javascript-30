<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
  </head>
  <body>
    <div class="panels">
      <div class="panel panel1">
        <p>Hey</p>
        <p>Let's</p>
        <p>Dance</p>
      </div>
      <div class="panel panel2">
        <p>Give</p>
        <p>Take</p>
        <p>Receive</p>
      </div>
      <div class="panel panel3">
        <p>Experience</p>
        <p>It</p>
        <p>Today</p>
      </div>
      <div class="panel panel4">
        <p>Give</p>
        <p>All</p>
        <p>You can</p>
      </div>
      <div class="panel panel5">
        <p>Life</p>
        <p>In</p>
        <p>Motion</p>
      </div>
    </div>
    <style>
      html {
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        margin: 0;
      }
      .panels {
        display: flex;
        min-height: 100vh;
        overflow: hidden;
      }

      .panel {
        flex: 1;
        background-position: center bottom;
        background-size: cover;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        transition:
          font-size 0.7s cubic-bezier(0.61, -0.19, 0.7, -0.11),
          flex 0.7s cubic-bezier(0.61, -0.19, 0.7, -0.11),
          background 0.2s;
      }

      .panel > * {
        margin: 0;
        width: 100%;
        transition: transform 0.5s;
        flex: 1 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .panel > *:first-child {
        transform: translateY(-100%);
      }
      .panel > *:last-child {
        transform: translateY(100%);
      }

      .panel *:nth-child(2) {
        font-size: 4em;
      }

      .panel.open {
        flex: 5;
        font-size: 40px;
      }

      p {
        font-weight: bolder;
        font-size: xx-large;
        color: gold;
      }

      .panel1 {
        background-image: url(https://images.pexels.com/photos/18497716/pexels-photo-18497716.jpeg);
      }
      .panel2 {
        background-image: url(https://images.pexels.com/photos/37127475/pexels-photo-37127475.jpeg);
      }
      .panel3 {
        background-image: url(https://images.pexels.com/photos/37216166/pexels-photo-37216166.jpeg);
      }
      .panel4 {
        background-image: url(https://images.pexels.com/photos/32707511/pexels-photo-32707511.jpeg);
      }
      .panel5 {
        background-image: url(https://images.pexels.com/photos/13199593/pexels-photo-13199593.jpeg);
      }
    </style>
    <script>
        function toggleOpen(e) {
            this.classList.toggle("open");
        }
        const panel = document.querySelectorAll('.panel');
        panel.forEach(pl => {
            pl.addEventListener('click', toggleOpen);
        })
    </script>
  </body>
</html>
